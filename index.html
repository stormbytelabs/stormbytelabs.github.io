<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            font-family: 'Noto Sans', sans-serif;
        }
        
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        
        .logo {
            max-width: 370px;
            height: auto;
        }

        .hero {
            width: 100%;
            height: 100vh;
            background: url('assets/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .overlay {
            padding: 50px;
            border-radius: 10px;
        }

        .menu-overlay {
            height: 100%;
            width: 0;
            position: fixed;
            top: 0;
            left: 0;
            background-color: #000000;
            overflow-x: hidden;
            transition: 0.5s;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
        }
        .menu-overlay a {
            padding: 15px;
            text-decoration: none;
            font-size: 36px;
            color: #ffffff;
            display: block;
            transition: 0.3s;
            font-weight: 700;
        }
        .menu-overlay a:hover {
            color: #007fff;
        }
        .close-btn {
            position: absolute;
            top: 20px;
            right: 45px;
            font-size: 40px;
            color: white;
            cursor: pointer;
        }
        .menu-btn {
            font-size: 30px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="overlay">
            <img src="assets/logo.png" alt="Logo" class="logo">
            <br>
            <span class="menu-btn" onclick="openNav()">&#9776; Open Menu</span>
        </div>
    </section>
    <div id="myNav" class="menu-overlay">
        <span class="close-btn" onclick="closeNav()">&times;</span>
        <a href="#">Games</a>
        <a href="#">Blog</a>
        <a href="#">About</a>
        <a href="#">Careers</a>
    </div>
    <script>
        function openNav() {
            document.getElementById("myNav").style.width = "100%";
        }
        function closeNav() {
            document.getElementById("myNav").style.width = "0%";
        }
    </script>
</body>
</html>
