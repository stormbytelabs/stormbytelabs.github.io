<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans:ital,wght@0,100..900;1,100..900&display=swap');

        * {
            font-family: 'Noto Sans', sans-serif;
        }
        
        body {
            margin: 0;
            background-color: #000;
            color: #fff;
            text-align: center;
        }
        
        .logo {
            max-width: 360px;
            height: auto;
        }

        .hero {
            width: 100%;
            height: 100vh;
            background: url('assets/background.png') no-repeat center center/cover;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            position: relative;
        }

        .overlay {
            padding: 50px;
            border-radius: 10px;
        }

        .games {
            display: flex;
            justify-content: center;
            gap: 20px;
            flex-wrap: wrap;
            margin-top: 30px;
        }
        
        .game-card {
            background-color: #111;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }
        
        .game-card h3 {
            margin: 10px 0;
        }

        .game-card img {
            width: 100%;
            border-radius: 10px;
        }
        
        .view-button {
            background-color: white;
            color: black;
            border: none;
            padding: 10px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <section class="hero">
        <div class="overlay">
            <img src="assets/logo.png" alt="Logo" class="logo">
        </div>
    </section>

    <h1>Explore Our Games</h1>
    <div class="games">
        <div class="game-card">
            <img src="assets/striker-arena.png">
            <h3>Striker Arena</h3>
            <button class="view-button">Learn More</button>
        </div>
    </div>

    <footer>
        <br>
        <hr>
        <br>
        <p>© 2025 Stormbyte Labs</p>
        <br>
    </footer>
</body>
</html>
